server {
    listen 8081;
    server_name _;
    resolver 127.0.0.11 valid=30s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;
    etag on;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    auth_basic "demo-agentforge";
    auth_basic_user_file /etc/nginx/conf.d/demo-auth.htpasswd;

    location = /version.json {
        default_type application/json;
        expires 30s;
        add_header Cache-Control "public, max-age=30, must-revalidate" always;
        try_files $uri =404;
    }

    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    location /api/ {
        set $api_upstream api:9001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://$api_upstream;
    }

    location = /dev/tasks {
        return 302 /dev/tasks/ui?project_key=demo;
    }

    location = /dev/tasks/ {
        return 302 /dev/tasks/ui?project_key=demo;
    }

    location /dev/tasks/ {
        set $task_tracker_upstream task-tracker:9102;
        rewrite ^/dev/tasks/(.*)$ /$1 break;
        proxy_http_version 1.1;
        proxy_set_header Accept-Encoding "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /dev/tasks;
        proxy_pass http://$task_tracker_upstream;
        proxy_redirect ~^(/.*)$ /dev/tasks$1;

        sub_filter_once off;
        sub_filter_types text/html text/css application/javascript text/javascript;
        sub_filter 'href="/' 'href="/dev/tasks/';
        sub_filter 'src="/' 'src="/dev/tasks/';
        sub_filter 'action="/' 'action="/dev/tasks/';
        sub_filter 'fetch("/' 'fetch("/dev/tasks/';
        sub_filter "fetch('/" "fetch('/dev/tasks/";
        sub_filter '"/api/v1/' '"/dev/tasks/api/v1/';
        sub_filter "'/api/v1/" "'/dev/tasks/api/v1/";
        sub_filter 'url(/' 'url(/dev/tasks/';
    }

    location = /dev/beads {
        return 302 /dev/beads/;
    }

    location = /dev/beads/ws {
        set $beads_ui_upstream beads-ui:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://$beads_ui_upstream/ws;
    }

    location /dev/beads/ {
        set $beads_ui_upstream beads-ui:8080;
        rewrite ^/dev/beads/(.*)$ /$1 break;
        proxy_http_version 1.1;
        proxy_set_header Accept-Encoding "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /dev/beads;
        proxy_pass http://$beads_ui_upstream;
        proxy_redirect ~^(/.*)$ /dev/beads$1;

        sub_filter_once off;
        sub_filter_types text/html text/css application/javascript text/javascript;
        sub_filter 'href="/' 'href="/dev/beads/';
        sub_filter 'src="/' 'src="/dev/beads/';
        sub_filter 'action="/' 'action="/dev/beads/';
        sub_filter 'fetch("/' 'fetch("/dev/beads/';
        sub_filter "fetch('/" "fetch('/dev/beads/";
        sub_filter '<head>' '<head><script>window.__beadsWsRewriteInstalled=true;(function(){var NativeWebSocket=window.WebSocket;if(!NativeWebSocket){return;}function rewrite(url){try{var resolved=new URL(String(url),window.location.href);if(resolved.origin===window.location.origin&&resolved.pathname==="/ws"){resolved.pathname="/dev/beads/ws";return resolved.toString();}}catch(error){}return url;}function PatchedWebSocket(url,protocols){if(protocols===undefined){return new NativeWebSocket(rewrite(url));}return new NativeWebSocket(rewrite(url),protocols);}PatchedWebSocket.prototype=NativeWebSocket.prototype;Object.setPrototypeOf(PatchedWebSocket,NativeWebSocket);PatchedWebSocket.CONNECTING=NativeWebSocket.CONNECTING;PatchedWebSocket.OPEN=NativeWebSocket.OPEN;PatchedWebSocket.CLOSING=NativeWebSocket.CLOSING;PatchedWebSocket.CLOSED=NativeWebSocket.CLOSED;window.WebSocket=PatchedWebSocket;}());</script>';
        sub_filter '"/ws"' '"/dev/beads/ws"';
        sub_filter "'/ws'" "'/dev/beads/ws'";
        sub_filter 'url(/' 'url(/dev/beads/';
    }

    location /assets/ {
        expires -1;
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
